<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medix AI</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #F5F5F0; min-height: 100vh; }
.header { padding: 16px; display: flex; justify-content: space-between; align-items: center; }
.logo { font-size: 20px; font-weight: 600; color: #1A1A1A; }
.logo span { font-size: 11px; color: #888; display: block; font-weight: 400; }
.lang { font-size: 12px; color: #888; border: 1px solid #ddd; padding: 4px 10px; border-radius: 20px; background: white; }
.theme { font-size: 18px; cursor: pointer; background: none; border: none; }
.greeting { padding: 0 16px 20px; font-size: 14px; color: #888; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 16px; }
.card { background: white; border-radius: 16px; padding: 16px; border: 1px solid #E8E8E2; cursor: pointer; }
.icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-bottom: 10px; }
.icon.red { background: #FDECEA; }
.icon.blue { background: #E8F0FB; }
.icon.green { background: #E8F5EC; }
.icon.amber { background: #FDF3E3; }
.card-title { font-size: 13px; font-weight: 600; color: #1A1A1A; margin-bottom: 4px; }
.card-sub { font-size: 11px; color: #999; }
.footer { text-align: center; padding: 24px; font-size: 11px; color: #bbb; }
</style>
</head>
<body>
<div class="header">
  <div class="logo">Medix AI <span>Жедел жәрдем көмекшісі</span></div>
  <div style="display:flex;gap:8px;align-items:center;">
    <div class="lang">ҚАЗ | РУС</div>
    <button class="theme" onclick="toggleTheme()">☀️</button>
  </div>
</div>
<div class="greeting">Сәлем! Не көмектесе аламын?</div>
<div class="grid">
  <div class="card" onclick="alert('Карта вызова — скоро!')">
    <div class="icon red">🚨</div>
    <div class="card-title">Шақыру картасы</div>
    <div class="card-sub">Дауыс / мәтін</div>
  </div>
  <div class="card" onclick="alert('Приход/Расход — скоро!')">
    <div class="icon blue">💊</div>
    <div class="card-title">Кіріс / Шығыс</div>
    <div class="card-sub">Дәрі · Мед. бұйым</div>
  </div>
  <div class="card" onclick="alert('Протоколы — скоро!')">
    <div class="icon green">📋</div>
    <div class="card-title">Хаттамалар</div>
    <div class="card-sub">ҚР МДМ · Офлайн</div>
  </div>
  <div class="card" onclick="alert('Калькулятор — скоро!')">
    <div class="icon amber">🧮</div>
    <div class="card-title">Дозировка</div>
    <div class="card-sub">ЖИ іздеу</div>
  </div>
</div>
<div class="footer">Medix AI · v1.0</div>
<script>
window.Telegram.WebApp.ready();
function toggleTheme() {
  document.body.style.background = document.body.style.background === 'rgb(26, 31, 46)' ? '#F5F5F0' : '#1A1F2E';
}
</script>
</body>
</html>
