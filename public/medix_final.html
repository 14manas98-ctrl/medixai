<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MEDIX AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   RESET & BASE
============================================================ */
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Inter',sans-serif;overflow:hidden;}

/* ============================================================
   DARK THEME (default)
============================================================ */
:root{
  --bg:#060810; --bg2:#0c1221; --bg3:rgba(12,18,32,0.97);
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
  --text1:#d0ddf0; --text2:#4a6a8a; --text3:#1a2535;
  --accent:#00c9a7; --accent2:#0088ee;
  --danger:#f87171; --warn:#fbbf24; --success:#4ade80;
  --card:rgba(12,18,32,0.97); --sub:#3a5570; --inp:rgba(11,17,30,0.95);
  --hdr-border:rgba(255,255,255,0.06);
  --chip-bg:rgba(255,255,255,0.05); --chip-border:rgba(255,255,255,0.1); --chip-color:#c0cce0;
  --scroll:rgba(255,255,255,0.07);
  --send-border:rgba(255,255,255,0.13);
  --back-bg:rgba(255,255,255,0.05); --back-border:rgba(255,255,255,0.09); --back-color:#fff;
  --ex-label:#1a2a3a;
  --rcard-head-bg:transparent;
  --time-color:#1a2535;
  --copy-color:#4a6a8a; --copy-bg:rgba(255,255,255,0.04); --copy-border:rgba(255,255,255,0.09);
  --tag-bg:rgba(255,255,255,0.04); --tag-border:rgba(255,255,255,0.07); --tag-color:#2a4060;
  --status-bg:rgba(255,255,255,0.02);
  --src-bg:rgba(0,136,238,0.07); --src-border:rgba(0,136,238,0.2); --src-color:#60a8d8;
  --warn-box:rgba(248,113,113,0.07); --warn-box-border:rgba(248,113,113,0.2);
  --result-num:#00c9a7;
  --lseg-bg:#0c1221; --lseg-border:rgba(255,255,255,0.1); --lb-off:rgba(255,255,255,0.35);
  --tog-bg:#0c1221; --tog-border:rgba(255,255,255,0.08);
  --tk-bg:linear-gradient(135deg,#00c9a7,#0088ee); --tk-shadow:rgba(0,200,167,0.6); --tk-x:4px;
  --badge-bg:rgba(0,255,130,0.05); --badge-border:rgba(0,255,130,0.18); --badge-color:#4ade80;
  --hsub:#3d5570; --hcap:#1e2e40; --slbl:#16253a; --foot:#0c1622; --dv:rgba(255,255,255,0.04);
  --htitle-a:#ffffff; --htitle-b:#a0f0e8; --htitle-c:#70d4ff;
  --card-hover-border:rgba(0,200,167,0.35); --card-hover-shadow:rgba(0,200,167,0.1);
  --carr:#162030; --carr-hover:#00c9a7;
  --ci1a:#051428; --ci1b:#0a2860; --ci2a:#041510; --ci2b:#093522;
  --ci3a:#150828; --ci3b:#261055; --ci4a:#180f00; --ci4b:#342005;
  --ci-border:rgba(255,255,255,0.07);
  --med-plus-bg:rgba(0,200,167,0.1); --med-plus-border:rgba(0,200,167,0.3);
  --med-minus-bg:rgba(248,113,113,0.1); --med-minus-border:rgba(248,113,113,0.3);
  --med-zero:#1e2e40; --shift-color:#00c9a7;
  --shift-bg:rgba(0,200,167,0.07); --shift-border:rgba(0,200,167,0.2);
  --stab-bg:rgba(12,18,32,0.9);
  --exp-inp-bg:rgba(11,17,30,0.9);
  --modal-bg:#0c1221;
  --msg-user-bg:linear-gradient(135deg,rgba(0,200,167,0.18),rgba(0,136,238,0.15));
  --msg-user-border:rgba(0,200,167,0.25);
  --msg-ai-bg:rgba(12,18,32,0.97); --msg-ai-border:rgba(255,255,255,0.07);
}

/* ============================================================
   LIGHT THEME
============================================================ */
body.lt{
  --bg:#eef1f7; --bg2:#ffffff; --bg3:#ffffff;
  --border:rgba(0,0,0,0.07); --border2:rgba(0,0,0,0.12);
  --text1:#0f172a; --text2:#64748b; --text3:#99aabb;
  --card:#ffffff; --sub:#8899aa; --inp:#ffffff;
  --hdr-border:rgba(0,0,0,0.07);
  --chip-bg:#ffffff; --chip-border:rgba(0,0,0,0.1); --chip-color:#334155;
  --scroll:rgba(0,0,0,0.08);
  --send-border:rgba(0,0,0,0.1);
  --back-bg:rgba(0,0,0,0.05); --back-border:rgba(0,0,0,0.09); --back-color:#333;
  --ex-label:#99aabb;
  --rcard-head-bg:rgba(0,0,0,0.02);
  --time-color:#aab4be;
  --copy-color:#8899aa; --copy-bg:rgba(0,0,0,0.03); --copy-border:rgba(0,0,0,0.08);
  --tag-bg:rgba(0,0,0,0.04); --tag-border:rgba(0,0,0,0.08); --tag-color:#64748b;
  --status-bg:rgba(74,222,128,0.04);
  --src-bg:rgba(0,100,200,0.06); --src-border:rgba(0,100,200,0.18); --src-color:#0066bb;
  --warn-box:rgba(248,113,113,0.05); --warn-box-border:rgba(248,113,113,0.18);
  --result-num:#009977;
  --lseg-bg:#d0d8e8; --lseg-border:#b8c4d4; --lb-off:rgba(255,255,255,0.55);
  --tog-bg:#d0d8e8; --tog-border:#b8c4d4;
  --tk-bg:linear-gradient(135deg,#f59e0b,#ef4444); --tk-shadow:rgba(245,158,11,0.5); --tk-x:28px;
  --badge-bg:#f0fdf4; --badge-border:#86efac; --badge-color:#16a34a;
  --hsub:#5a7090; --hcap:#8899aa; --slbl:#99aabb; --foot:#bcc8d4; --dv:rgba(0,0,0,0.07);
  --htitle-a:#006688; --htitle-b:#006688; --htitle-c:#00aa88;
  --card-hover-border:rgba(0,150,200,0.3); --card-hover-shadow:rgba(0,150,200,0.1);
  --carr:#c5d0dc; --carr-hover:#0088cc;
  --ci1a:#dbeafe; --ci1b:#bfdbfe; --ci2a:#dcfce7; --ci2b:#bbf7d0;
  --ci3a:#ede9fe; --ci3b:#ddd6fe; --ci4a:#fef3c7; --ci4b:#fde68a;
  --ci-border:rgba(0,0,0,0.06);
  --med-plus-bg:rgba(0,200,167,0.08); --med-plus-border:rgba(0,200,167,0.25);
  --med-minus-bg:rgba(248,113,113,0.08); --med-minus-border:rgba(248,113,113,0.25);
  --med-zero:#c5d0dc; --shift-color:#009966;
  --shift-bg:rgba(0,150,100,0.07); --shift-border:rgba(0,150,100,0.2);
  --stab-bg:#ffffff;
  --exp-inp-bg:#f1f5f9;
  --modal-bg:#ffffff;
  --msg-user-bg:linear-gradient(135deg,rgba(0,200,167,0.12),rgba(0,136,238,0.1));
  --msg-user-border:rgba(0,200,167,0.3);
  --msg-ai-bg:#ffffff; --msg-ai-border:rgba(0,0,0,0.07);
}

body{background:var(--bg);color:var(--text1);transition:background 0.35s,color 0.35s;}

/* ============================================================
   SCREENS
============================================================ */
.screen{position:fixed;inset:0;display:none;flex-direction:column;background:var(--bg);transition:background 0.35s;}
.screen.active{display:flex;}

/* bg blobs */
.blob{position:absolute;pointer-events:none;border-radius:50%;filter:blur(75px);z-index:0;}
.b1{width:300px;height:200px;top:-60px;left:50%;transform:translateX(-50%);background:radial-gradient(circle,#00c9a7,#0055ff);opacity:0.11;}
.b2{width:200px;height:200px;bottom:100px;right:-50px;background:radial-gradient(circle,#00c9a7,transparent);opacity:0.05;}
.b3{width:150px;height:150px;bottom:200px;left:-40px;background:radial-gradient(circle,#0066ff,transparent);opacity:0.04;}
body.lt .blob{opacity:0.04!important;}
.inner{position:relative;z-index:1;display:flex;flex-direction:column;height:100%;}

/* ============================================================
   SHARED: HEADER
============================================================ */
.hdr{display:flex;align-items:center;gap:12px;padding:16px 18px 13px;border-bottom:1px solid var(--hdr-border);flex-shrink:0;position:relative;z-index:2;}
.back-btn{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;background:var(--back-bg);border:1px solid var(--back-border);color:var(--back-color);transition:opacity 0.2s;flex-shrink:0;}
.back-btn:hover{opacity:0.7;}
.hdr-info{flex:1;}
.hdr-title{font-size:15px;font-weight:700;color:var(--text1);}
.hdr-sub{font-size:11px;color:var(--sub);margin-top:1px;}

/* ============================================================
   SHARED: LANG + TOGGLE
============================================================ */
.lseg{display:flex;padding:4px;border-radius:14px;gap:3px;background:var(--lseg-bg);border:1px solid var(--lseg-border);}
.lb{padding:7px 16px;font-size:12px;font-weight:700;letter-spacing:0.06em;border:none;border-radius:10px;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.3s;color:var(--lb-off);background:transparent;}
.lb.on{background:linear-gradient(135deg,#00c9a7,#0088ee);color:#fff!important;font-weight:800;box-shadow:0 0 16px rgba(0,200,167,0.5);}
.lb:not(.on):hover{color:rgba(255,255,255,0.7);}
body.lt .lb:not(.on):hover{color:rgba(50,80,120,0.9);}

.tog{width:60px;height:32px;cursor:pointer;flex-shrink:0;}
.tog .tt{width:100%;height:100%;border-radius:16px;position:relative;background:var(--tog-bg);border:1px solid var(--tog-border);transition:all 0.3s;}
.tog .ti{position:absolute;inset:0;display:flex;justify-content:space-between;align-items:center;padding:0 8px;font-size:12px;pointer-events:none;z-index:1;}
.tog .tk{position:absolute;top:4px;left:4px;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;transition:transform 0.4s cubic-bezier(.34,1.56,.64,1),background 0.3s,box-shadow 0.3s;z-index:2;background:var(--tk-bg);box-shadow:0 0 14px var(--tk-shadow);transform:translateX(var(--tk-x));}

/* ============================================================
   SHARED: MID SCROLL
============================================================ */
.mid{flex:1;overflow-y:auto;padding:14px 14px 8px;position:relative;z-index:1;}
.mid::-webkit-scrollbar{width:3px;}
.mid::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:2px;}

/* ============================================================
   SHARED: WELCOME + CHIPS
============================================================ */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;gap:14px;padding:0 8px;}
.ex-label{font-size:9.5px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--ex-label);}
.chips{display:flex;flex-direction:column;gap:8px;width:100%;}
.chip{padding:12px 16px;border-radius:13px;cursor:pointer;font-size:13px;font-weight:500;text-align:left;line-height:1.45;background:var(--chip-bg);border:1px solid var(--chip-border);color:var(--chip-color);transition:all 0.22s;display:flex;align-items:flex-start;gap:10px;}
.chip-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.chip:hover{border-color:rgba(0,200,167,0.35);transform:translateX(3px);}
.chip:active{transform:scale(0.98);}

/* ============================================================
   SHARED: RESULT CARDS
============================================================ */
.rcard{border-radius:14px;margin-bottom:8px;overflow:hidden;animation:fadeUp 0.4s cubic-bezier(.22,1,.36,1) both;background:var(--card);border:1px solid var(--border);}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.rcard-head{display:flex;justify-content:space-between;align-items:center;padding:9px 13px;border-bottom:1px solid var(--border);background:var(--rcard-head-bg);}
.rcard-label{display:flex;align-items:center;gap:7px;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--sub);}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.db{background:#38bdf8;}.dg{background:#4ade80;}.dy{background:#fbbf24;}
.dr{background:#f87171;}.dm{background:#00c9a7;}.dgr{background:#475569;}.dp{background:#a78bfa;}
.copy-btn{font-size:10px;font-weight:600;border-radius:6px;padding:3px 9px;cursor:pointer;transition:all 0.2s;color:var(--copy-color);background:var(--copy-bg);border:1px solid var(--copy-border);}
.copy-btn:hover{color:var(--accent)!important;border-color:rgba(0,200,167,0.3)!important;}
.copy-btn.ok{color:#4ade80!important;border-color:rgba(74,222,128,0.3)!important;}
.rcard-body{padding:11px 13px;font-size:12.5px;line-height:1.75;color:var(--text2);}
.status-box{border-left:2px solid #4ade80;border-radius:0 6px 6px 0;padding:9px 12px;background:var(--status-bg);color:var(--text2);}
.mkb-list{display:flex;flex-direction:column;gap:5px;}
.mkb-item{display:flex;align-items:flex-start;gap:8px;border-radius:7px;padding:7px 10px;background:var(--tag-bg);}
.mkb-code{font-family:monospace;font-size:11px;font-weight:700;color:#38bdf8;background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.2);padding:2px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0;}
.mkb-name{font-size:12px;line-height:1.4;padding-top:1px;color:var(--sub);}
.tags{display:flex;flex-wrap:wrap;gap:5px;}
.tag{font-size:11px;padding:3px 9px;border-radius:5px;background:var(--tag-bg);border:1px solid var(--tag-border);color:var(--tag-color);}
.time-info{font-size:10px;text-align:right;padding:2px 2px 8px;color:var(--time-color);}
.loading-card{border-radius:14px;padding:32px;text-align:center;background:var(--card);border:1px solid var(--border);}
.spinner{width:34px;height:34px;border:2px solid rgba(0,200,160,0.15);border-top-color:#00c9a7;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:12px;color:var(--sub);}
@keyframes cin{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* ============================================================
   SHARED: BOTTOM INPUT
============================================================ */
.bottom{flex-shrink:0;padding:10px 14px 18px;border-top:1px solid var(--hdr-border);background:var(--bg);position:relative;z-index:2;}
.inp-row{display:flex;gap:10px;align-items:flex-end;}
.inp{flex:1;border-radius:14px;padding:13px 16px;font-size:13.5px;font-family:'Inter',sans-serif;line-height:1.55;resize:none;outline:none;min-height:50px;max-height:130px;background:var(--inp);border:1.5px solid var(--border2);color:var(--text1);transition:border-color 0.3s;}
.inp:focus{border-color:rgba(0,200,167,0.4);}
.inp::placeholder{color:var(--text3);}
.send{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all 0.2s;border:1.5px solid var(--send-border);background:var(--inp);}
.send:hover{opacity:0.8;}.send:active{transform:scale(0.93);}.send:disabled{opacity:0.3;cursor:not-allowed;}
.send svg{width:26px;height:26px;fill:var(--text1);}

/* ============================================================
   SCREEN HOME
============================================================ */
.hero{padding:12px 20px 22px;text-align:center;flex-shrink:0;}
.htitle{font-size:34px;font-weight:800;letter-spacing:0.06em;line-height:1;margin-bottom:8px;background:linear-gradient(135deg,var(--htitle-a) 0%,var(--htitle-b) 50%,var(--htitle-c) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hsub{font-size:13px;margin-bottom:16px;line-height:1.5;color:var(--hsub);}
.badge{display:inline-flex;align-items:center;gap:8px;padding:7px 18px;border-radius:24px;font-size:11.5px;font-weight:600;letter-spacing:0.05em;margin-bottom:14px;background:var(--badge-bg);border:1px solid var(--badge-border);color:var(--badge-color);}
.bdot{width:7px;height:7px;border-radius:50%;background:#4ade80;flex-shrink:0;animation:bdot 2s ease-in-out infinite;}
@keyframes bdot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.3;transform:scale(1.7)}}
.hcap{font-size:12px;line-height:1.7;color:var(--hcap);}
.dv{height:1px;margin:8px 20px;background:var(--dv);}
.slbl{font-size:10px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;padding:14px 20px 10px;color:var(--slbl);}
.home-cards{padding:0 14px;display:flex;flex-direction:column;gap:9px;overflow-y:auto;flex:1;padding-bottom:16px;}
.home-cards::-webkit-scrollbar{width:3px;}
.home-cards::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:2px;}
.hcard{display:flex;align-items:center;gap:14px;padding:15px 16px;border-radius:18px;cursor:pointer;opacity:0;animation:cin 0.5s cubic-bezier(.22,1,.36,1) forwards;transition:transform 0.3s cubic-bezier(.34,1.56,.64,1),box-shadow 0.3s,border-color 0.3s;background:var(--card);border:1px solid var(--border);}
.hcard:nth-child(1){animation-delay:0.06s}.hcard:nth-child(2){animation-delay:0.13s}.hcard:nth-child(3){animation-delay:0.20s}.hcard:nth-child(4){animation-delay:0.27s}
.hcard:hover{transform:translateY(-4px);border-color:var(--card-hover-border);box-shadow:0 10px 32px var(--card-hover-shadow);}
.hcard:active{transform:scale(0.97)!important;transition:transform 0.1s!important;}
.ci{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;border:1px solid var(--ci-border);}
.ci1{background:linear-gradient(135deg,var(--ci1a),var(--ci1b));}
.ci2{background:linear-gradient(135deg,var(--ci2a),var(--ci2b));}
.ci3{background:linear-gradient(135deg,var(--ci3a),var(--ci3b));}
.ci4{background:linear-gradient(135deg,var(--ci4a),var(--ci4b));}
.cinfo{flex:1;min-width:0;}
.ctit{font-size:14px;font-weight:600;margin-bottom:3px;color:var(--text1);}
.cdsc{font-size:11.5px;line-height:1.4;color:var(--sub);}
.carr{font-size:22px;font-weight:300;transition:color 0.3s,transform 0.3s;flex-shrink:0;color:var(--carr);}
.hcard:hover .carr{transform:translateX(4px);color:var(--carr-hover);}
.hfoot{text-align:center;padding:20px;font-size:9.5px;font-weight:600;letter-spacing:0.13em;text-transform:uppercase;color:var(--foot);flex-shrink:0;}

/* ============================================================
   SCREEN KARTA вЂ” patient type toggle
============================================================ */
.ptype{display:flex;gap:8px;padding:10px 14px 0;flex-shrink:0;position:relative;z-index:1;}
.ptype-btn{flex:1;padding:9px;border-radius:12px;border:1.5px solid var(--border);background:var(--card);color:var(--sub);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.25s;text-align:center;font-family:'Inter',sans-serif;}
.ptype-btn.on{background:linear-gradient(135deg,rgba(0,200,167,0.15),rgba(0,136,238,0.15));border-color:rgba(0,200,167,0.4);color:var(--accent);}

/* ============================================================
   SCREEN MEDS
============================================================ */
.tabs-wrap{flex-shrink:0;padding:10px 14px 0;position:relative;z-index:2;}
.tabs{display:flex;gap:6px;background:var(--stab-bg);border-radius:14px;padding:4px;border:1px solid var(--border);}
.mtab{flex:1;padding:8px 4px;border-radius:10px;text-align:center;font-size:11px;font-weight:700;letter-spacing:0.04em;cursor:pointer;transition:all 0.25s;color:var(--sub);}
.mtab.on{background:linear-gradient(135deg,rgba(0,200,167,0.18),rgba(0,136,238,0.18));color:var(--accent);border:1px solid rgba(0,200,167,0.25);}
.sub-tabs-wrap{padding:10px 14px 6px;flex-shrink:0;}
.sub-tabs{display:flex;gap:5px;}
.stab{padding:7px 14px;border-radius:10px;font-size:11px;font-weight:700;cursor:pointer;transition:all 0.2s;color:var(--sub);background:var(--card);border:1px solid var(--border);font-family:'Inter',sans-serif;}
.stab.on{background:linear-gradient(135deg,rgba(0,200,167,0.12),rgba(0,136,238,0.12));color:var(--accent);border-color:rgba(0,200,167,0.3);}
.pane{display:none;flex-direction:column;flex:1;overflow:hidden;}
.pane.active{display:flex;}
.list-scroll{flex:1;overflow-y:auto;padding:6px 14px 16px;}
.list-scroll::-webkit-scrollbar{width:3px;}
.list-scroll::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:2px;}
.sec-label{font-size:9px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--text3);padding:14px 2px 6px;}
.item-row{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:13px;margin-bottom:6px;background:var(--card);border:1px solid var(--border);animation:fadeUp 0.35s cubic-bezier(.22,1,.36,1) both;}
.item-name{flex:1;min-width:0;}
.item-title{font-size:13px;font-weight:600;color:var(--text1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.cnt-val.zero{color:var(--med-zero);}
.exp-row{flex-direction:column;align-items:stretch;gap:0;padding:12px 14px;}

/* ============================================================
   MODAL
============================================================ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:200;display:none;align-items:flex-end;backdrop-filter:blur(4px);}

.modal{width:100%;background:var(--modal-bg);border-radius:22px 22px 0 0;padding:22px 18px 30px;max-height:85vh;display:flex;flex-direction:column;animation:slideUp 0.3s cubic-bezier(.22,1,.36,1);}

.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-shrink:0;}
.modal-title{font-size:15px;font-weight:700;color:var(--text1);}

.msg-wrap{display:flex;flex-direction:column;gap:12px;}

.ai-section:last-child{margin-bottom:0;}

.loading-bubble{background:var(--msg-ai-bg);border:1px solid var(--msg-ai-border);border-radius:4px 16px 16px 16px;padding:14px 16px;display:flex;align-items:center;gap:10px;max-width:88%;}
.dots{display:flex;gap:4px;}
.dot-anim{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:dotP 1.2s ease-in-out infinite;}
.dot-anim:nth-child(2){animation-delay:0.2s;}.dot-anim:nth-child(3){animation-delay:0.4s;}
@keyframes dotP{0%,80%,100%{opacity:0.2;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}

}

.warn-icon{font-size:13px;flex-shrink:0;margin-top:1px;}
.warn-text{font-size:12px;color:var(--text2);line-height:1.5;}
</style>

function applyTheme(){
  document.body.classList.toggle('lt',!dark);
  const tkEl = document.getElementById('h-tk');
  if(tkEl) tkEl.textContent = dark?'рџЊ™':'вЂпёЏ';
}
function toggleTheme(){
  dark=!dark;
  localStorage.setItem('medix_theme',dark?'dark':'light');
  applyTheme();
}

function setLang(l){
  lang=l;

  renderAll();
}

function renderAll(){
  // HOME
  setText('h-sub',t('hSub')); setHTML('h-cap',t('hCap'));
  setText('h-st',t('hSt')); setText('h-mod',t('hMod'));
  setText('h-t1',t('t1'));setText('h-d1',t('d1'));

  setText('h-t3',t('t3'));setText('h-d3',t('d3'));
  setText('h-t4',t('t4'));setText('h-d4',t('d4'));
  setText('h-foot',t('hFoot'));
  // lang buttons
  ['h-kz','k-kz','ai-kz','c-kz'].forEach(id=>{const el=document.getElementById(id);if(el)el.classList.toggle('on',lang==='kz');});
  ['h-ru','k-ru','ai-ru','c-ru'].forEach(id=>{const el=document.getElementById(id);if(el)el.classList.toggle('on',lang==='ru');});
  // KARTA
  setText('k-title',t('kTitle'));setText('k-sub',t('kSub'));
  setText('k-ex-label',t('kExLabel'));
  setText('pt-adult',t('ptA'));setText('pt-child',t('ptC'));setText('pt-preg',t('ptP'));
  setAttr('k-inp','placeholder',t('kPh'));
  renderKartaChips();
  // MEDS
  setText('m-title',t('mTitle'));setText('m-sub',t('mSub'));
  setText('mt-rashod',t('tabRashod'));setText('mt-prihod',t('tabPrihod'));setText('mt-ostatki',t('tabOstatki'));
  setText('m-jbtn-r',t('jBtnR'));setText('m-jbtn-p',t('jBtnP'));
  setText('m-reset',t('resetBtn'));
  renderMedSubTabs();renderRashodList();renderPrihodList();updateShiftTime();
  // AI
  setText('ai-title',t('aiTitle'));setText('ai-sub',t('aiSub'));
  setText('ai-ex-label',t('aiExLabel'));
  setAttr('ai-inp','placeholder',t('aiPh'));
  renderAiChips();
  // CALC
  setText('c-title',t('cTitle'));setText('c-sub',t('cSub'));
  setText('ct-dose-lbl',t('cTabDose'));setText('ct-shock-lbl',t('cTabShock'));
  setText('c-ex-label',t('cExLabel'));
  setText('sh-ex-label',t('cExLabel'));
  setAttr('c-inp','placeholder',t('cPh'));
  renderChipsFor('c-chips',t('cChips'),'setEx("c-inp",this)');
  renderChipsFor('sh-chips',t('shockChips'),'setShockEx(this)');
}

function renderChipsFor(contId, chips, onclick){
  const el=document.getElementById(contId);
  if(!el||!chips) return;
  el.innerHTML=chips.map(c=>`<div class="chip" onclick="${onclick}"><span class="chip-icon">${c.i}</span><span>${c.t}</span></div>`).join('');
}
function setEx(inpId, chipEl){
  const txt=chipEl.querySelector('span:last-child').textContent;
  const inp=document.getElementById(inpId);
  inp.value=txt;ar(inp);inp.focus();
}
function setText(id,v){const el=document.getElementById(id);if(el)el.textContent=v;}
function setHTML(id,v){const el=document.getElementById(id);if(el)el.innerHTML=v;}
function setAttr(id,attr,v){const el=document.getElementById(id);if(el)el.setAttribute(attr,v);}

// ================================================================
// NAVIGATION
// ================================================================
function goTo(screen){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('s-'+screen).classList.add('active');
  if(screen==='meds'){renderMedSubTabs();renderRashodList();renderPrihodList();updateShiftTime();}
}

// ================================================================
// UTILS
// ================================================================
function ar(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,130)+'px';}
function kKey(e,prefix){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(prefix==='k')genKarta();else if(prefix==='ai')genAI();else genCalc();}}
function cpBtn(btn,txt){
  navigator.clipboard.writeText(txt).then(()=>{
    btn.textContent=t('copied');btn.classList.add('ok');
    setTimeout(()=>{btn.textContent=t('copy');btn.classList.remove('ok');},2000);
  });
}
function escA(s){return(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' ').replace(/"/g,'&quot;');}

function setPtype(pt){
  ptype=pt;
  document.getElementById('pt-adult').classList.toggle('on',pt==='adult');
  document.getElementById('pt-child').classList.toggle('on',pt==='child');
  document.getElementById('pt-preg').classList.toggle('on',pt==='preg');
  renderKartaChips();

function renderKartaChips(){
  let chips;
  if(ptype==='preg') chips=t('kChipsPreg');
  else if(ptype==='child') chips=t('kChipsChild');
  else chips=t('kChips');
  const cont=document.getElementById('k-chips');
  if(!cont||!chips) return;
  cont.innerHTML=chips.map(c=>`<div class="chip" onclick="setKartaEx(this)"><span class="chip-icon">${c.i}</span><span>${c.t}</span></div>`).join('');
}
function renderAiChips(){
  const cont=document.getElementById('ai-chips');

  if(!cont||!chips) return;
  cont.innerHTML=chips.map(c=>`<div class="chip" onclick="setAiEx(this)"><span class="chip-icon">${c.i}</span><span>${c.t}</span></div>`).join('');
}

async function genKarta(){
  const inp=document.getElementById('k-inp');
  const txt=inp.value.trim();if(!txt)return;
  document.getElementById('k-welcome').style.display='none';
  document.getElementById('k-send').disabled=true;
  document.getElementById('k-results').innerHTML=loadCard(t('loading'));
  document.getElementById('k-mid').scrollTop=0;
  const start=Date.now();
  try{
    const r=await apiCall({system:kartaSystemPrompt(),messages:[{role:'user',content:(lang==='kz'?'РЁР°Т›С‹СЂСѓ:\n':'Р’С‹Р·РѕРІ:\n')+txt}],max_tokens:2000});
    let raw=r.content[0].text.replace(/```json|```/g,'').trim();
    const jm=raw.match(/\{[\s\S]*\}/);if(jm)raw=jm[0];
    const d=JSON.parse(raw);
    renderKartaResult(d,((Date.now()-start)/1000).toFixed(1));
    inp.value='';inp.style.height='';
  }catch(e){showErr('k-results',e.message);}
  document.getElementById('k-send').disabled=false;
}

function renderKartaResult(d,time){
  const secs=[
    {l:t('sComplaints'),dot:'db',body:(lang==='kz'?'РќР°СѓТ›Р°СЃ РјС‹РЅР°РґР°Р№ С€Р°Т“С‹РјРґР°СЂ Т±СЃС‹РЅР°РґС‹: ':'РќР° РјРѕРјРµРЅС‚ РѕСЃРјРѕС‚СЂР° Р¶Р°Р»РѕР±С‹ РЅР° ')+d.complaints},
    {l:t('sMorbi'),dot:'db',body:d.anamnesis_morbi},
    {l:t('sVitae'),dot:'dgr',body:d.anamnesis_vitae},
    {l:t('sStatus'),dot:'dg',sp:'status',body:d.status_localis},
    {l:t('sInstr'),dot:'dgr',sp:'tags',body:d.instruments,ecg:d.ecg},
    {l:t('sDiag'),dot:'dy',body:d.diagnosis},
    {l:t('sMkb'),dot:'dp',sp:'mkb',body:d.mkb},
    {l:t('sTreat'),dot:'dm',body:d.treatment},
    {l:t('sTactics'),dot:'dr',body:d.tactics},
  ];
  let html='';
  secs.forEach((s,i)=>{
    const rawTxt=typeof s.body==='string'?s.body:JSON.stringify(s.body);
    let b='';
    if(s.sp==='status') b=`<div class="status-box">${s.body}</div>`;
    else if(s.sp==='tags') b=`<div style="font-size:12.5px;line-height:1.9;color:var(--text2)">${(s.body||[]).map(x=>`${x}`).join('<br>')}</div>${s.ecg?`<div style="margin-top:8px;font-size:12px;color:var(--text2)">Р­РљР“: ${s.ecg}</div>`:''}`;
    else if(s.sp==='mkb') b=`<div class="mkb-list">${(s.body||[]).map(m=>`<div class="mkb-item"><span class="mkb-code">${m.code}</span><span class="mkb-name">${m.name}</span></div>`).join('')}</div>`;
    else b=s.body;
    html+=`<div class="rcard" style="animation-delay:${i*0.04}s"><div class="rcard-head"><div class="rcard-label"><span class="dot ${s.dot}"></span>${s.l}</div><button class="copy-btn" onclick="cpBtn(this,'${escA(rawTxt)}')">${t('copy')}</button></div><div class="rcard-body">${b}</div></div>`;
  });
  html+=`<div class="time-info">${time} СЃРµРє В· </div>`;
  document.getElementById('k-results').innerHTML=html;
}

function loadMedsState(){
  const def={};[...LIST1,...LIST2,...LIST3,...LIST4].forEach(d=>{def[d.id]={r:0,p:0,o:0};});
  try{return JSON.parse(localStorage.getItem('medix_meds_v3')||'null')||def;}catch(e){return def;}
}
function saveMedsState(){localStorage.setItem('medix_meds_v3',JSON.stringify(medsState));}
function loadJournal(key){try{return JSON.parse(localStorage.getItem(key)||'[]');}catch(e){return[];}}
function saveJournal(key,arr){localStorage.setItem(key,JSON.stringify(arr));}
function loadExpEntries(){try{return JSON.parse(localStorage.getItem('medix_exp_v3')||'{}');}catch(e){return{};}}
function saveExpEntries(){localStorage.setItem('medix_exp_v3',JSON.stringify(expEntries));}

let shiftStart=localStorage.getItem('medix_shift_v3')||new Date().toISOString();

function updateShiftTime(){
  const diff=Math.floor((Date.now()-new Date(shiftStart))/60000);
  const h=Math.floor(diff/60),m=diff%60;
  const el=document.getElementById('shift-time');
  if(el) el.textContent=`${h} С‡ ${m} РјРёРЅ`;
}
setInterval(updateShiftTime,60000);

function renderMedSubTabs(){
  const rtabs=document.getElementById('rashod-stabs');
  const ptabs=document.getElementById('prihod-stabs');
  const otabs=document.getElementById('ostatki-stabs');
  if(!rtabs||!ptabs) return;
  const labels=[t('stab1'),t('stab2'),t('stab3'),t('stab4')];
  rtabs.innerHTML=labels.map((l,i)=>`<div class="stab${medsRashodTab===i+1?' on':''}" onclick="switchMSubTab('r',${i+1})">${l}</div>`).join('');
  ptabs.innerHTML=labels.map((l,i)=>`<div class="stab${medsIncomeTab===i+1?' on':''}" onclick="switchMSubTab('p',${i+1})">${l}</div>`).join('');
  if(otabs) otabs.innerHTML=labels.map((l,i)=>`<div class="stab${medsOstatkiTab===i+1?' on':''}" onclick="switchMSubTab('o',${i+1})">${l}</div>`).join('');
}
function switchMTab(tab){
  document.getElementById('pane-rashod').classList.toggle('active',tab==='rashod');
  document.getElementById('pane-prihod').classList.toggle('active',tab==='prihod');
  document.getElementById('pane-ostatki').classList.toggle('active',tab==='ostatki');
  document.getElementById('mt-rashod').classList.toggle('on',tab==='rashod');
  document.getElementById('mt-prihod').classList.toggle('on',tab==='prihod');
  document.getElementById('mt-ostatki').classList.toggle('on',tab==='ostatki');
  if(tab==='ostatki') renderOstatkiList();
}
function switchMSubTab(side,n){
  if(side==='r'){medsRashodTab=n;renderRashodList();}
  else if(side==='p'){medsIncomeTab=n;renderPrihodList();}
  else{medsOstatkiTab=n;renderOstatkiList();}
  renderMedSubTabs();
}

function renderRashodList(){
  const cont=document.getElementById('rashod-list');
  if(!cont) return;
  cont.innerHTML='';
  const list=LISTS[medsRashodTab];
  if(medsRashodTab===3){renderList3(cont,list);}
  else{
    list.forEach((item,i)=>{
      const val=medsState[item.id]?.r||0;
      const row=document.createElement('div');
      row.className='item-row';row.style.animationDelay=(i*0.02)+'s';
      row.innerHTML=`<div class="item-name"><div class="item-title">${item.name}</div><div class="item-dose">${item.dose}</div></div><div class="counter"><div class="cnt-btn m" onclick="changeR('${item.id}',-1)">в€’</div><div class="cnt-val${val===0?' zero':''}" id="rv-${item.id}">${val}</div><div class="cnt-btn p" onclick="changeR('${item.id}',+1)">+</div></div>`;
      cont.appendChild(row);
    });
  }
}
function changeR(id,delta){
  if(!medsState[id]) medsState[id]={r:0,p:0};
  medsState[id].r=Math.max(0,(medsState[id].r||0)+delta);
  saveMedsState();
  const el=document.getElementById('rv-'+id);
  if(el){el.textContent=medsState[id].r;el.className='cnt-val'+(medsState[id].r===0?' zero':'');}
  if(delta>0){
    const item=[...LIST1,...LIST2,...LIST4].find(x=>x.id===id);
    if(item){rashodJournal.push({id,name:item.name,dose:item.dose,qty:1,time:now()});saveJournal('medix_rjour_v3',rashodJournal);}
  }
}

function renderList3(cont,list){
  list.forEach((item,i)=>{
    const entries=expEntries[item.id]||[{call:'',qty:''}];
    const row=document.createElement('div');
    row.className='item-row exp-row';row.style.animationDelay=(i*0.02)+'s';
    const eh=entries.map((e,ei)=>`<div class="exp-entry"><input class="exp-inp" placeholder="${lang==='kz'?'в„– С€Р°Т›С‹СЂСѓ':'в„– РІС‹Р·РѕРІР°'}" value="${e.call||''}" oninput="upExp('${item.id}',${ei},'call',this.value)"><input class="exp-inp num" type="number" placeholder="${lang==='kz'?'РјУ©Р».':'РєРѕР».'}" value="${e.qty||''}" oninput="upExp('${item.id}',${ei},'qty',this.value)" min="0"><div class="exp-del" onclick="delExp('${item.id}',${ei})">вњ•</div></div>`).join('');
    row.innerHTML=`<div class="exp-top"><div class="item-name"><div class="item-title">${item.name}</div><div class="item-dose">${item.dose}</div></div></div><div class="exp-entries" id="expE-${item.id}">${eh}</div><div class="exp-add-line" onclick="addExp('${item.id}')">пј‹ ${t('addCall')}</div>`;
    cont.appendChild(row);
  });
}
function upExp(itemId,idx,field,val){
  if(!expEntries[itemId]) expEntries[itemId]=[{call:'',qty:''}];
  expEntries[itemId][idx][field]=val;
  saveExpEntries();
  const item=LIST3.find(x=>x.id===itemId);
  const entry=expEntries[itemId]?.[idx];
  if(!item||!entry) return;
  const key=itemId+'_'+idx;
  const qty=parseInt(entry.qty)||0;
  const ei=rashodJournal.findIndex(j=>j.key===key);
  if(qty>0){

function appendAIMsg(rawText,contId){
  const wrap=document.getElementById(contId);
  const div=document.createElement('div');div.className='msg ai';
  const formatted=formatAIText(rawText);
  const plain=rawText;
  div.innerHTML=`<div class="msg-avatar">рџ¤–</div><div class="msg-bubble">${formatted}<div class="msg-footer"><button class="copy-btn" onclick="cpBtn(this,'${escA(plain)}')">${t('copy')}</button><span style="font-size:10px;color:var(--time-color)">${now()}</span></div></div>`;
  wrap.appendChild(div);

function formatAIText(text){
  let html=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>');
  const parts=html.split(/\n(?=#{1,3}\s)/);
  if(parts.length>1){
    return parts.map(part=>{
      const hm=part.match(/^#{1,3}\s(.+)\n?([\s\S]*)/);
      if(hm) return `<div class="ai-section"><div class="ai-section-title">в–ё ${hm[1]}</div><div class="ai-section-body">${fmtBody(hm[2]||'')}</div></div>`;
      return `<div class="ai-section-body">${fmtBody(part)}</div>`;
    }).join('');
  }
  return `<div class="ai-section-body">${fmtBody(html)}</div>`;
}
function fmtBody(text){
  if(!text.trim()) return '';
  const lines=text.split('\n');let html='';let inL=false;
  lines.forEach(line=>{
    const tr=line.trim();if(!tr){if(inL){html+='</ul>';inL=false;}return;}
    if(/^[-вЂў]\s/.test(tr)||/^\d+\.\s/.test(tr)){
      if(!inL){html+='<ul>';inL=true;}
      html+=`<li>${tr.replace(/^[-вЂў]\s/,'').replace(/^\d+\.\s/,'')}</li>`;
    } else {if(inL){html+='</ul>';inL=false;}html+=`<p>${tr}</p>`;}
  });
  if(inL) html+='</ul>';return html;
}

async function apiCall({system, messages, max_tokens=2000, tools, endpoint}){
  if(!endpoint){
    const hasSearch = tools && tools.some(x=>x.name==='web_search');
    endpoint = hasSearch ? 'https://medixai-production.up.railway.app/api/ai' : 'https://medixai-production.up.railway.app/api/karta';
  }
  const body={system, messages, max_tokens};
  if(tools) body.tools=tools;
  const r=await fetch(endpoint,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  const data=await r.json();
  if(data.error) throw new Error(data.error.message||JSON.stringify(data.error));
  return data;
}

function filterList(section,query){
  const q=query.toLowerCase().trim();
  const cont=document.getElementById(section+'-list');
  if(!cont) return;
  const rows=cont.querySelectorAll('.item-row,.income-row');
  rows.forEach(row=>{
    const name=row.querySelector('.item-title,.income-title');
    const dose=row.querySelector('.item-dose,.income-dose');
    const text=((name?name.textContent:'')+(dose?dose.textContent:'')).toLowerCase();
    row.style.display=(!q||text.includes(q))?'':'none';
  });
}

function showErr(contId,msg){document.getElementById(contId).innerHTML=`<div class="loading-card"><div style="color:#f87171;font-size:13px">${lang==='kz'?'ТљР°С‚Рµ':'РћС€РёР±РєР°'}: ${msg}</div></div>`;}
