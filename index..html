<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medix AI — Карта вызова СМП</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080f1a;
    --surface: #0d1829;
    --surface2: #112240;
    --border: #1e3a5f;
    --border2: #243d6a;
    --accent: #00d4ff;
    --accent2: #0099bb;
    --green: #00e5a0;
    --yellow: #ffd166;
    --red: #ff6b6b;
    --purple: #c084fc;
    --text: #cdd9e5;
    --text2: #8899aa;
    --text3: #4a6070;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Manrope', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
    background-image:
      radial-gradient(ellipse at 20% 0%, #001a3320 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, #001a2a20 0%, transparent 60%);
  }

  .header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 20px; padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #00d4ff22, #00d4ff44);
    border: 1px solid var(--accent); border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; flex-shrink: 0;
  }
  .header-text h1 { font-size: 1rem; font-weight: 700; color: var(--accent); letter-spacing: 0.02em; }
  .header-text p { font-size: 0.72rem; color: var(--text3); margin-top: 1px; }

  .input-label {
    font-size: 0.68rem; font-weight: 600; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.1em;
    margin-bottom: 7px; display: flex; align-items: center; gap: 6px;
  }
  .input-label::before {
    content: ''; display: inline-block;
    width: 4px; height: 4px; background: var(--accent); border-radius: 50%;
  }
  textarea {
    width: 100%; background: var(--surface);
    border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); padding: 12px 14px;
    font-size: 0.875rem; font-family: var(--sans);
    line-height: 1.6; resize: vertical; min-height: 88px;
    outline: none; transition: border-color 0.2s; margin-bottom: 12px;
  }
  textarea:focus { border-color: var(--accent2); }
  textarea::placeholder { color: var(--text3); }

  .btn {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, #00d4ff, #0099bb);
    border: none; border-radius: 10px;
    color: #000d1a; font-size: 0.9rem; font-weight: 700;
    font-family: var(--sans); cursor: pointer; margin-bottom: 18px;
    letter-spacing: 0.02em; transition: opacity 0.2s, transform 0.1s;
  }
  .btn:hover { opacity: 0.92; }
  .btn:active { transform: scale(0.99); }
  .btn:disabled { background: var(--surface2); color: var(--text3); cursor: not-allowed; transform: none; }

  /* CARD */
  .card { display: none; }
  .card.visible { display: block; }

  .card-header {
    background: var(--surface2); border: 1px solid var(--border);
    border-bottom: none; border-radius: 12px 12px 0 0;
    padding: 12px 16px; display: flex; justify-content: space-between; align-items: center;
  }
  .card-header-left { display: flex; align-items: center; gap: 8px; }
  .card-tag {
    font-size: 0.68rem; font-weight: 700; font-family: var(--mono);
    color: var(--accent); background: #00d4ff15;
    border: 1px solid #00d4ff30; padding: 3px 8px;
    border-radius: 4px; letter-spacing: 0.05em;
  }
  .card-header-title { font-size: 0.82rem; font-weight: 600; color: var(--text); }
  .card-time { font-size: 0.7rem; font-family: var(--mono); color: var(--text3); }

  .card-body {
    background: var(--surface); border: 1px solid var(--border);
    border-top: none; border-radius: 0 0 12px 12px; overflow: hidden;
  }

  .loading { padding: 32px 16px; text-align: center; }
  .pulse-ring {
    width: 40px; height: 40px; border: 2px solid var(--border2);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.9s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { font-size: 0.8rem; color: var(--text3); }

  .section { padding: 13px 16px; border-bottom: 1px solid var(--border); }
  .section:last-child { border-bottom: none; }

  .section-label {
    font-size: 0.65rem; font-weight: 700; font-family: var(--mono);
    color: var(--text3); text-transform: uppercase; letter-spacing: 0.12em;
    margin-bottom: 7px; display: flex; align-items: center; gap: 6px;
  }
  .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .dot-blue { background: var(--accent); }
  .dot-green { background: var(--green); }
  .dot-yellow { background: var(--yellow); }
  .dot-red { background: var(--red); }
  .dot-purple { background: var(--purple); }
  .dot-gray { background: var(--text3); }

  .section-content { font-size: 0.875rem; line-height: 1.7; color: var(--text); }



  /* STATUS LOCALIS */
  .status-box {
    background: var(--surface2); border: 1px solid var(--border);
    border-left: 3px solid var(--green);
    border-radius: 0 8px 8px 0; padding: 10px 14px;
  }

  /* INSTRUMENTS */
  .instruments-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .instrument-tag {
    font-size: 0.72rem; font-family: var(--mono);
    background: var(--surface2); border: 1px solid var(--border2);
    color: var(--text2); padding: 3px 9px; border-radius: 4px;
  }

  /* MKB */
  .mkb-list { display: flex; flex-direction: column; gap: 6px; }
  .mkb-item {
    display: flex; align-items: flex-start; gap: 10px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px;
  }
  .mkb-code {
    font-family: var(--mono); font-size: 0.78rem; font-weight: 600;
    color: var(--accent); background: #00d4ff12;
    border: 1px solid #00d4ff25; padding: 2px 7px;
    border-radius: 4px; white-space: nowrap; flex-shrink: 0;
  }
  .mkb-desc { font-size: 0.82rem; color: var(--text2); line-height: 1.4; padding-top: 1px; }

  .card-footer {
    background: var(--surface2); border: 1px solid var(--border);
    border-top: 1px solid var(--border); border-radius: 0 0 12px 12px;
    padding: 8px 16px; display: flex; justify-content: space-between;
    font-size: 0.7rem; font-family: var(--mono); color: var(--text3);
  }
  .card-footer span { color: var(--accent); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🏥</div>
  <div class="header-text">
    <h1>MEDIX AI</h1>
    <p>Карта вызова СМП · Казахстан</p>
  </div>
</div>

<div class="input-label">Описание вызова</div>
<textarea id="input" placeholder="Опишите вызов — что случилось, симптомы, что сделали, показатели...">Вызвали б-р СМП, пациент онкология лёгких стадия 4, нарастающая одышка, состояние ухудшилось, вызвали для транспортировки в ЭГБ для решения вопроса о трахеостомии.</textarea>

<button class="btn" id="btn" onclick="generate()">📋 Написать карту вызова</button>

<div class="card" id="card">
  <div class="card-header">
    <div class="card-header-left">
      <span class="card-tag">СМП</span>
      <span class="card-header-title">Карта вызова</span>
    </div>
    <span class="card-time" id="card-time">—</span>
  </div>
  <div class="card-body" id="card-body">
    <div class="loading"><div class="pulse-ring"></div><p>Составляю карту...</p></div>
  </div>
  <div class="card-footer" id="card-footer" style="display:none">
    <span id="footer-model">Claude Sonnet</span>
    <span id="footer-time">—</span>
  </div>
</div>

<script>
const SYSTEM = `Ты помогаешь фельдшеру скорой помощи Казахстана заполнить карту вызова СМП.

Пиши живым, простым медицинским языком — как опытный фельдшер пишет от руки. Без лишних научных слов. Естественно, понятно, по делу.

ВАЖНО для Status Localis:
- Пиши одним блоком — осмотр пациента: сознание, ориентация, кожные покровы, зев, аускультация, живот, FAST-тест
- НЕ включай в Status Localis: АД, пульс, сатурацию, ЧДД, температуру — это в витальных показателях
- Меняй Status Localis под диагноз:
  * Бронхиальная астма/одышка → дыхание жёсткое, хрипы сухие, одышка экспираторная, вынужденное положение, участие вспомогательных мышц
  * Травма → деформация, отёк, гематома, болезненность при пальпации, крепитация
  * ОКС → тоны сердца, ритм, отёки нижних конечностей
  * Инсульт → речь, зрачки, симметрия лица, парез конечностей
  * Норма → стандартный шаблон

ШАБЛОН Status Localis (норма):
"На момент осмотра пациент в сознании, ориентирован во времени, месте и собственной личности. На вопросы отвечает корректно. Видимых травм и повреждений кожных покровов нет. Кожные покровы физиологической окраски, сыпи нет. Зев спокоен. Аускультативно дыхание везикулярное, хрипов нет. Живот мягкий, безболезненный при пальпации. Менингеальных симптомов нет. FAST-тест отрицательный."

Если данных нет — пиши [не уточнено]. Не придумывай цифры.

Отвечай СТРОГО только JSON без markdown:

{
  "complaints": "жалобы со слов пациента",
  "anamnesis_morbi": "анамнез заболевания",
  "anamnesis_vitae": "анамнез жизни — хронические болезни, Д-учёт, туберкулёз/гепатит отрицает, аллергии, эпиданамнез",

  "status_localis": "осмотр одним блоком без АД/пульса/сатурации",
  "instruments": ["Пульсоксиметрия", "Аускультация", "АД", "ЧСС", "ЧДД", "Термометрия", "ЭКГ"],
  "ecg": "описание ЭКГ если есть или null",
  "diagnosis": "диагноз текстом",
  "treatment": "оказанная помощь",
  "tactics": "тактика",
  "mkb": [
    {"code": "XXX.X", "name": "название по МКБ-10"}
  ]
}

МКБ: все релевантные коды — основной диагноз, осложнения, сопутствующие состояния.`;

function renderCard(d, elapsed) {
  const time = new Date().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
  document.getElementById('card-time').textContent = time;



  // instruments
  const instrHtml = (d.instruments || []).map(i => `<span class="instrument-tag">${i}</span>`).join('');
  const ecgLine = d.ecg ? `<div style="margin-top:8px;font-size:0.82rem;color:var(--text2)">ЭКГ: ${d.ecg}</div>` : '';

  // mkb
  const mkbHtml = (d.mkb || []).map(m => `
    <div class="mkb-item">
      <span class="mkb-code">${m.code}</span>
      <span class="mkb-desc">${m.name}</span>
    </div>`).join('');

  document.getElementById('card-body').innerHTML = `
    <div class="section">
      <div class="section-label"><span class="dot dot-blue"></span>Жалобы</div>
      <div class="section-content">На момент осмотра пациент предъявляет жалобы на ${d.complaints}</div>
    </div>
    <div class="section">
      <div class="section-label"><span class="dot dot-blue"></span>Анамнез заболевания</div>
      <div class="section-content">${d.anamnesis_morbi}</div>
    </div>
    <div class="section">
      <div class="section-label"><span class="dot dot-gray"></span>Анамнез жизни</div>
      <div class="section-content">${d.anamnesis_vitae}</div>
    </div>

    <div class="section">
      <div class="section-label"><span class="dot dot-green"></span>Status Localis</div>
      <div class="status-box"><div class="section-content">${d.status_localis}</div></div>
    </div>
    <div class="section">
      <div class="section-label"><span class="dot dot-gray"></span>Инструментальные методы</div>
      <div class="instruments-list">${instrHtml}</div>
      ${ecgLine}
    </div>
    <div class="section">
      <div class="section-label"><span class="dot dot-yellow"></span>Диагноз СМП</div>
      <div class="section-content">${d.diagnosis}</div>
    </div>
    <div class="section">
      <div class="section-label"><span class="dot dot-purple"></span>МКБ-10</div>
      <div class="mkb-list">${mkbHtml}</div>
    </div>
    <div class="section">
      <div class="section-label"><span class="dot dot-gray"></span>Оказанная помощь</div>
      <div class="section-content">${d.treatment}</div>
    </div>
    <div class="section">
      <div class="section-label"><span class="dot dot-red"></span>Тактика</div>
      <div class="section-content">${d.tactics}</div>
    </div>`;

  const footer = document.getElementById('card-footer');
  footer.style.display = 'flex';
  document.getElementById('footer-time').textContent = elapsed + ' сек';
}

async function generate() {
  const input = document.getElementById('input').value.trim();
  if (!input) return;

  const btn = document.getElementById('btn');
  const card = document.getElementById('card');
  const body = document.getElementById('card-body');

  btn.disabled = true;
  btn.textContent = '⏳ Составляю карту...';
  card.classList.add('visible');
  document.getElementById('card-footer').style.display = 'none';
  body.innerHTML = `<div class="loading"><div class="pulse-ring"></div><p>Составляю карту...</p></div>`;

  const start = Date.now();
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': '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', 'anthropic-version': '2023-06-01' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1500,
        system: SYSTEM,
        messages: [{ role: 'user', content: input }]
      })
    });
    const data = await res.json();
    const elapsed = ((Date.now() - start) / 1000).toFixed(1);
    let text = data.content?.[0]?.text || '';
    text = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(text);
    renderCard(parsed, elapsed);
  } catch(e) {
    body.innerHTML = `<div class="section"><div class="section-content" style="color:var(--red)">Ошибка: ${e.message}</div></div>`;
  }

  btn.disabled = false;
  btn.textContent = '🔄 Новая карта';
}
</script>
</body>
</html>
